  <script>
  (function(){
    const SB = supabase.createClient(
      'https://obpezocujzdaznrdgwoo.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icGV6b2N1anpkYXpucmRnd29vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTU4MzAsImV4cCI6MjA5MDAzMTgzMH0.SZx4ilUcyaA732zB6qInKVLuFHntzU9C_K0x7Y_dbuc'
    );

    // Chaves que são GLOBAIS (plataforma) vs POR ALUNO
    const GLOBAL_KEYS = new Set(['nl7-c','nl7-lc','nl7-cm']); // cursos, conteudo aulas, comentários
    const STUDENT_KEYS = new Set(['nl7-s','nl7-n','nl7-notes','nl7-lv','nl7-em','nl7-bd']); // alunos, notifs, notas, last viewed, emails, badges
    const LOCAL_ONLY = new Set(['nl7-session']); // sessão só local

    function getStudentEmail(){
      try{
        const s=localStorage.getItem('nl7-session');
        if(s){const o=JSON.parse(s);return o&&o.email?o.email:null;}
      }catch{}
      return null;
    }

    async function sbGet(table, id){
      try{
        const {data,error}=await SB.from(table).select('data').eq(id[0],id[1]).maybeSingle();
        if(error||!data)return null;
        return typeof data.data==='string'?data.data:JSON.stringify(data.data);
      }catch{return null;}
    }

    async function sbSet(table, match, jsonVal){
      try{
        const row={...match, data:jsonVal, updated_at:new Date().toISOString()};
        await SB.from(table).upsert(row,{onConflict:Object.keys(match).join(',')});
      }catch(e){console.warn('SB write error:',e);}
    }

    window._SB = SB; // exposto para ser usado na geração de conteúdo
    window.storage = {
      get: async (k) => {
        // Sessão: só localStorage
        if(LOCAL_ONLY.has(k)){
          try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch{return null;}
        }
        // Dados globais da plataforma
        if(GLOBAL_KEYS.has(k)){
          const val=await sbGet('nl_platform',['key',k]);
          if(val!==null)return{key:k,value:val};
          // fallback localStorage
          try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch{return null;}
        }
        // Dados por aluno
        if(STUDENT_KEYS.has(k)){
          const email=getStudentEmail();
          if(email){
            const val=await sbGet('nl_student_data',['student_email||key',email+'|'+k]);
            // query correcta:
            try{
              const {data,error}=await SB.from('nl_student_data').select('data')
                .eq('student_email',email).eq('key',k).maybeSingle();
              if(!error&&data)return{key:k,value:typeof data.data==='string'?data.data:JSON.stringify(data.data)};
            }catch{}
          }
          // fallback localStorage
          try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch{return null;}
        }
        try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch{return null;}
      },

      set: async (k, v) => {
        const val=typeof v==='string'?v:JSON.stringify(v);
        let jsonVal;try{jsonVal=JSON.parse(val);}catch{jsonVal=val;}
        // Sempre guardar em localStorage como cache rápido
        try{localStorage.setItem(k,val);}catch{}
        if(LOCAL_ONLY.has(k))return{key:k,value:val};
        // Dados globais
        if(GLOBAL_KEYS.has(k)){
          await sbSet('nl_platform',{key:k},jsonVal);
          return{key:k,value:val};
        }
        // Dados por aluno
        if(STUDENT_KEYS.has(k)){
          const email=getStudentEmail();
          if(email){
            try{
              await SB.from('nl_student_data').upsert(
                {student_email:email,key:k,data:jsonVal,updated_at:new Date().toISOString()},
                {onConflict:'student_email,key'}
              );
            }catch(e){console.warn('SB student write:',e);}
          }
          return{key:k,value:val};
        }
        return{key:k,value:val};
      },

      delete: async (k) => {
        try{localStorage.removeItem(k);}catch{}
        if(GLOBAL_KEYS.has(k)){
          try{await SB.from('nl_platform').delete().eq('key',k);}catch{}
        }
        if(STUDENT_KEYS.has(k)){
          const email=getStudentEmail();
          if(email){try{await SB.from('nl_student_data').delete().eq('student_email',email).eq('key',k);}catch{}}
        }
        return{key:k,deleted:true};
      },

      list: async (p) => {
        try{const ks=Object.keys(localStorage).filter(k=>!p||k.startsWith(p));return{keys:ks};}catch{return{keys:[]};}
      }
    };
  })();
  </script>

  const startNarration=(text)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const chunks=text.match(/[^.!?]+[.!?]+/g)||[text];
    let i=0;
    const speakNext=()=>{
      if(i>=chunks.length){setSpeaking(false);return;}
      const u=new SpeechSynthesisUtterance(chunks[i].trim());
      u.lang="pt-PT";u.rate=0.95;u.pitch=1;
      const voices=window.speechSynthesis.getVoices();
      const ptVoice=voices.find(v=>v.lang.startsWith("pt"));
      if(ptVoice)u.voice=ptVoice;
      u.onend=()=>{i++;speakNext();};
      u.onerror=()=>{i++;speakNext();};
      speechRef.current=u;
      window.speechSynthesis.speak(u);
    };
    setSpeaking(true);speakNext();
  };

                  const correct=sel===correctIdx;
                  const answers=[{question,selected:sel,correct,selectedText:opts[sel],correctText:opts[correctIdx]}];

      </div>

                  </div>
                </div>

            )}
          </div>
        </div>
      </div>
    </div>);
  };

      h+=`<div class="page"><h1>${mod}</h1>`;
      mls.forEach(l=>{

  const genPPTHTML=(c)=>{

          if(lc.keyPoints.length)h+=S("#f0f8ff",`<h2>Pontos-chave</h2><ul style="font-size:15px;line-height:2.2">${lc.keyPoints.map(k=>`<li>${k}</li>`).join("")}</ul>`);

  const genTestHTML=(c)=>{

  const genContent=async(course,lesson)=>{
    const key=lesson.id;
    if(lcRef.current[key])return;
    setGeneratingId(key);
    await new Promise(r=>setTimeout(r,50));
    const allLessons=mkL(course.md,course.id);
    const lessonIdx=allLessons.findIndex(l=>l.id===key);
    const prevLessons=allLessons.slice(Math.max(0,lessonIdx-3),lessonIdx);
    const nextLessons=allLessons.slice(lessonIdx+1,lessonIdx+3);
    const prevCtx=prevLessons.map(l=>{const lc=lcRef.current[l.id];return lc?`${l.mt}: ${(lc.keyPoints||[]).slice(0,2).join("; ")}`:l.mt;}).join(" → ");
    const nextCtx=nextLessons.map(l=>l.title).join(", ");
    // Buscar programa do curso no Supabase — independente por curso, facultativo
    let programCtx="";
    try{
      const {data}=await window._SB.from("nl_programs").select("content").eq("course_id",course.id).maybeSingle();
      if(data?.content) programCtx=data.content;
    }catch{}
    try{
      // Usar Edge Function como proxy seguro para a API Anthropic
      const resp=await fetch("https://obpezocujzdaznrdgwoo.supabase.co/functions/v1/generate-lesson",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          courseTitle:course.title,
          courseLevel:course.lv,
          lessonTitle:lesson.title,
          lessonModule:lesson.mt,
          lessonType:lesson.type,
          lessonIdx,
          totalLessons:allLessons.length,
          lessonDuration:lesson.dur,
          prevCtx,
          nextCtx,
          programCtx
        })
      });
      const data=await resp.json();
      if(!data.ok) throw new Error(data.error||"Erro na geração");
      const parsed=data.content;
      const norm={
        paragraphs:parsed.p||parsed.paragraphs||[],
        keyPoints:parsed.kp||parsed.keyPoints||[],
        codeExample:parsed.code||parsed.codeExample||null,
        instructorTip:parsed.tip||parsed.instructorTip||null,
        quiz:parsed.q?{
          question:parsed.q.q||parsed.q.question||"",
          options:parsed.q.o||parsed.q.options||[],
          correctIndex:parsed.q.c??parsed.q.correctIndex??0,
          explanation:parsed.q.e||parsed.q.explanation||""
        }:null
      };
      const updated={...lcRef.current,[key]:norm};
      lcRef.current=updated;
      setLessonContent(updated);
      try{await window.storage.set(LCK,JSON.stringify(updated));}catch{}
    }catch(err){
      console.error("genContent error:",err);
      const fallback={paragraphs:[`Erro ao gerar conteúdo: ${err.message||"tenta novamente"}`],keyPoints:[],codeExample:null,instructorTip:null,quiz:null};
      const updated={...lcRef.current,[key]:fallback};
      lcRef.current=updated;
      setLessonContent(updated);
      try{await window.storage.set(LCK,JSON.stringify(updated));}catch{}
    }
    setGeneratingId(null);
    await new Promise(r=>setTimeout(r,50));
  };

  const agSend=async(overrideMsg)=>{
    const msg=(overrideMsg||agIn).trim();
    if(!msg)return;
    // Detect course creation intent — launch wizard
    if(isCourseIntent(msg)&&!agWizard&&!overrideMsg?.includes("Duração por aula:")){
      setAgMsg(p=>[...p,{r:"u",t:msg}]);setAgIn("");
      setAgWizard({step:0,topic:msg.replace(/cria(r)?( um)?( curso)?( (sobre|de|acerca de))?/gi,"").trim()||""});
      return;
    }
    setAgMsg(p=>[...p,{r:"u",t:msg}]);setAgIn("");setAgLoad(true);
    try{
      const resp=await fetch("https://obpezocujzdaznrdgwoo.supabase.co/functions/v1/agent",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          message:msg,
          systemPrompt:`Tu és o agente da plataforma "NeuroLearn". Cria cursos, analisa métricas, gere alunos e actualiza programas.
Para CRIAR curso, responde APENAS JSON: {"action":"create_course","course":{"title":"...","sub":"...","cat":"...","lv":"Iniciante|Intermédio|Avançado","dur":"...","mods":N,"price":XX,"emoji":"...","desc":"...","inst":"...","topics":["..."],"md":[{"title":"Nome do Módulo","lessons":N,"duration":"Xh","topics":["Tópico específico 1","Tópico específico 2"]}]}}
Para ACTUALIZAR programa de um curso, responde APENAS JSON: {"action":"update_program","course_id":"ID","title":"Título do curso","content":"Conteúdo completo do programa actualizado"}
IMPORTANTE: cada módulo DEVE ter um array "topics" com os tópicos obrigatórios de cada aula (1 por lesson). Sê específico nos tópicos — são o programa oficial do curso.
Quando o admin diz "actualiza o programa", "novo programa" ou envia um programa, usa a action update_program.
Cursos: ${JSON.stringify(courses.map(c=>({t:c.title,s:c.stu,p:c.pub})))}. Alunos:${students.length}. Receita:€${rev}. Responde em PT, sê conciso.`
        })
      });
      const data=await resp.json();
      if(!data.ok) throw new Error(data.error||"Erro no agente");

      try{

          }catch(e){setAgMsg(p2=>[...p2,{r:"a",t:`Erro ao actualizar programa: ${e.message}`}]);}
          setAgLoad(false);return;
        }
      }catch{}
      setAgMsg(p=>[...p,{r:"a",t:text}]);

  const AAnalytics=()=>{

      const lessonStats=ls.map(l=>{const done=enrolled.filter(s=>(s.done?.[c.id]||[]).includes(l.id)).length;return{title:l.title,done,pct:enrolled.length?Math.round(done/enrolled.length*100):0};});

  return(<div style={{fontFamily:F,color:"#1D1D1F",background:"#FBFBFD",minHeight:"100vh",opacity:mounted?1:0,transition:"opacity .4s"}} onClick={()=>showNotif&&setShowNotif(false)}><PNav/>{view==="home"&&<Home/>}{view==="courses"&&<PubCourses/>}{view==="pricing"&&<Pricing/>}{view==="detail"&&<Detail/>}{view==="about"&&<div style={{background:"#FBFBFD"}}><style>{anim}</style>

  {/* HERO */}
  <div style={{background:"linear-gradient(135deg,#0071E308,#AF52DE06)",borderBottom:bd,padding:"72px clamp(16px,4vw,48px) 60px",textAlign:"center"}}>
    <div style={{maxWidth:700,margin:"0 auto"}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"5px 16px",borderRadius:980,background:"rgba(0,113,227,.1)",color:"#0071E3",fontSize:12,fontWeight:600,marginBottom:20,letterSpacing:".04em",textTransform:"uppercase"}}>Sobre a NeuroLearn</div>
      <h1 style={{fontSize:"clamp(30px,5vw,48px)",fontWeight:700,letterSpacing:"-0.03em",lineHeight:1.1,marginBottom:20}}>A plataforma de IA<br/><span style={{background:"linear-gradient(135deg,#0071E3,#AF52DE)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>feita em Portugal</span></h1>
      <p style={{fontSize:17,color:"#6E6E73",lineHeight:1.75,marginBottom:32}}>A NeuroLearn nasceu com uma missão clara: democratizar o acesso ao ensino de Inteligência Artificial em língua portuguesa. Numa área dominada por conteúdo em inglês, criámos uma plataforma onde profissionais portugueses aprendem IA de forma prática, actualizada e sem barreiras linguísticas.</p>
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        <button style={{...B(true),padding:"13px 32px"}} onClick={()=>setView("courses")}>Explorar cursos</button>
        <button style={{...B(false),padding:"13px 32px"}} onClick={()=>goStuLogin()}>Criar conta grátis</button>
      </div>
    </div>
  </div>

  {/* STATS */}
  <div style={{maxWidth:900,margin:"0 auto",padding:"48px clamp(16px,4vw,48px) 0"}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:14,marginBottom:56}}>
      {[{v:pub.length+"",l:"Cursos disponíveis",c:"#0071E3",e:"📚"},{v:"15.000+",l:"Alunos formados",c:"#30D158",e:"👩‍🎓"},{v:"4.8 / 5",l:"Avaliação média",c:"#FF9500",e:"⭐"},{v:"100%",l:"Conteúdo em PT-PT",c:"#AF52DE",e:"🇵🇹"},{v:"30h+",l:"Horas de conteúdo",c:"#FF375F",e:"⏱"}].map((s,i)=>(
        <div key={i} style={{...crd,padding:"20px 18px",border:bd,textAlign:"center",animation:`fu .4s ease ${.1+i*.06}s both`}}>
          <div style={{fontSize:22,marginBottom:6}}>{s.e}</div>
          <div style={{fontSize:26,fontWeight:700,color:s.c,letterSpacing:"-0.02em"}}>{s.v}</div>
          <div style={{fontSize:11,color:"#86868B",fontWeight:500,marginTop:4,lineHeight:1.3}}>{s.l}</div>
        </div>
      ))}
    </div>

    {/* MISSÃO */}
    <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:24,marginBottom:56,alignItems:"center"}}>
      <div style={{animation:"fu .5s ease .1s both"}}>
        <div style={{fontSize:11,fontWeight:600,color:"#0071E3",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>A nossa missão</div>
        <h2 style={{fontSize:28,fontWeight:700,letterSpacing:"-0.02em",marginBottom:16,lineHeight:1.25}}>Tornar a IA acessível a todos os profissionais portugueses</h2>
        <p style={{fontSize:14,color:"#6E6E73",lineHeight:1.75,marginBottom:14}}>Vivemos numa era em que a Inteligência Artificial está a transformar todas as profissões. Mas a maioria dos recursos de qualidade está em inglês, desactualizada, ou é demasiado teórica para uso no dia-a-dia.</p>
        <p style={{fontSize:14,color:"#6E6E73",lineHeight:1.75}}>A NeuroLearn resolve isso: cursos práticos, em português, criados por especialistas e continuamente actualizados com o apoio de IA generativa. Do Excel com IA ao desenvolvimento de agentes autónomos — temos o percurso certo para cada profissional.</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12,animation:"fu .5s ease .2s both"}}>
        {[
          {icon:"🎯",t:"Aprendizagem orientada a resultados",d:"Cada aula termina com um exercício prático aplicável imediatamente no trabalho."},
          {icon:"🔄",t:"Conteúdo sempre actualizado",d:"A IA regenera e actualiza as aulas automaticamente quando surgem novas ferramentas e técnicas."},
          {icon:"🏆",t:"Certificação profissional",d:"Certificados reconhecidos para o teu LinkedIn, CV e progressão de carreira."},
          {icon:"🤝",t:"Suporte real da comunidade",d:"Faz perguntas, partilha projectos e aprende com outros profissionais portugueses."}
        ].map((x,i)=>(
          <div key={i} style={{...crd,padding:"14px 18px",border:bd,display:"flex",gap:12,alignItems:"flex-start"}}>
            <span style={{fontSize:20,flexShrink:0,marginTop:1}}>{x.icon}</span>
            <div><div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{x.t}</div><div style={{fontSize:12,color:"#6E6E73",lineHeight:1.5}}>{x.d}</div></div>
          </div>
        ))}
      </div>
    </div>

    {/* EQUIPA */}
    <div style={{marginBottom:56}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:11,fontWeight:600,color:"#AF52DE",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Quem somos</div>
        <h2 style={{fontSize:26,fontWeight:700}}>A equipa por detrás da NeuroLearn</h2>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(3,1fr)",gap:16}}>
        {[
          {name:"Dr. Ana Silva",role:"Directora de Conteúdo",area:"Machine Learning & Deep Learning",bg:"#0071E3",init:"AS",desc:"Doutorada em IA pela Universidade de Lisboa. 10 anos de experiência em investigação e ensino de machine learning."},
          {name:"Prof. Marco Santos",role:"Especialista LLMs",area:"Prompt Engineering & NLP",bg:"#30D158",init:"MS",desc:"Ex-engenheiro Google e OpenAI. Especialista em modelos de linguagem e aplicações empresariais de IA generativa."},
          {name:"Eng. Pedro Costa",role:"Tech Lead",area:"Agentes & Desenvolvimento",bg:"#FF375F",init:"PC",desc:"15 anos em engenharia de software. Pioneiro no desenvolvimento de agentes autónomos com LangChain em Portugal."},
        ].map((p,i)=>(
          <div key={i} style={{...crd,padding:"22px 20px",border:bd,textAlign:"center",animation:`fu .4s ease ${.2+i*.08}s both`}}>
            <div style={{width:56,height:56,borderRadius:"50%",background:p.bg,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:700,margin:"0 auto 12px"}}>{p.init}</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>{p.name}</div>
            <div style={{fontSize:12,color:p.bg,fontWeight:600,marginBottom:6}}>{p.role}</div>
            <div style={{fontSize:11,color:"#86868B",marginBottom:10}}>{p.area}</div>
            <div style={{fontSize:12,color:"#6E6E73",lineHeight:1.5}}>{p.desc}</div>
          </div>
        ))}
      </div>
    </div>

    {/* TIMELINE */}
    <div style={{marginBottom:56}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:11,fontWeight:600,color:"#FF9500",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>A nossa história</div>
        <h2 style={{fontSize:26,fontWeight:700}}>Como chegámos até aqui</h2>
      </div>
      <div style={{position:"relative",paddingLeft:isMobile?0:32}}>
        {!isMobile&&<div style={{position:"absolute",left:8,top:8,bottom:8,width:2,background:"linear-gradient(#0071E3,#AF52DE)",borderRadius:2}}/>}
        {[
          {year:"2023",t:"A ideia nasce",d:"Identificámos uma lacuna enorme: não existia nenhuma plataforma de qualidade para aprender IA em português. Começámos a esboçar o conceito da NeuroLearn."},
          {year:"2024",t:"Primeiros cursos lançados",d:"Lançámos os 3 primeiros cursos — Fundamentos de IA, Prompt Engineering e IA para Negócios. Em 6 meses atingimos 5.000 alunos."},
          {year:"2025",t:"Plataforma completa",d:"Expandimos para 7 cursos, introduzimos certificados, o sistema de quizzes e a comunidade de alunos. 15.000 profissionais formados."},
          {year:"2026",t:"IA na geração de conteúdo",d:"Tornámo-nos a primeira plataforma portuguesa a usar IA generativa para criar e actualizar automaticamente o conteúdo de cada aula em tempo real."},
        ].map((e,i)=>(
          <div key={i} style={{display:"flex",gap:16,marginBottom:20,alignItems:"flex-start",animation:`fu .4s ease ${.1+i*.07}s both`}}>
            {!isMobile&&<div style={{width:18,height:18,borderRadius:"50%",background:i===3?"#AF52DE":"#0071E3",flexShrink:0,marginTop:2,border:"3px solid #FBFBFD",zIndex:1}}/>}
            <div style={{...crd,padding:"16px 20px",border:bd,flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:700,color:"#0071E3",background:"#0071E310",padding:"2px 10px",borderRadius:980}}>{e.year}</span>
                <span style={{fontSize:14,fontWeight:600}}>{e.t}</span>
              </div>
              <p style={{fontSize:13,color:"#6E6E73",lineHeight:1.6,margin:0}}>{e.d}</p>
            </div>
          </div>
        ))}
      </div>
    </div>

    {/* FAQ */}
    <div style={{marginBottom:56}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:11,fontWeight:600,color:"#30D158",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>FAQ</div>
        <h2 style={{fontSize:26,fontWeight:700}}>Perguntas frequentes</h2>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {[
          {q:"Os cursos têm data de início e fim?",a:"Não. Todos os cursos são 100% assíncronos — podes começar quando quiseres, ao teu ritmo, e tens acesso vitalício ao conteúdo."},
          {q:"Os certificados são reconhecidos em Portugal?",a:"Os certificados da NeuroLearn são emitidos digitalmente e podem ser partilhados no LinkedIn. São reconhecidos por empresas parceiras e cada vez mais valorizados no mercado de trabalho português."},
          {q:"Preciso de conhecimentos técnicos para começar?",a:"Depende do curso. Temos cursos para todos os níveis — desde Iniciante (sem conhecimentos necessários) até Avançado. Cada curso indica claramente o nível e pré-requisitos."},
          {q:"O conteúdo está sempre actualizado?",a:"Sim. Usamos IA generativa para regenerar e actualizar o conteúdo das aulas regularmente, garantindo que reflecte as ferramentas e técnicas mais recentes."},
          {q:"Posso pedir factura?",a:"Sim. Após a compra recebes automaticamente um recibo por email. Para factura com NIF/nome de empresa, envia email para facturacao@neurolearn.pt."},
          {q:"Existe suporte se tiver dúvidas?",a:"Sim. Podes colocar dúvidas nos comentários de cada aula, onde a comunidade e os formadores respondem. Planos Anual e Vitalício têm suporte prioritário por email."},
        ].map((f,i)=>(<details key={i} style={{...crd,border:bd,borderRadius:12,overflow:"hidden",animation:`fu .3s ease ${.1+i*.05}s both`}}>
          <summary style={{padding:"16px 20px",fontSize:14,fontWeight:600,cursor:"pointer",listStyle:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            {f.q}<span style={{fontSize:18,color:"#86868B",flexShrink:0,marginLeft:8}}>+</span>
          </summary>
          <div style={{padding:"0 20px 16px",fontSize:13,color:"#6E6E73",lineHeight:1.7,borderTop:bd}}>{f.a}</div>
        </details>))}
      </div>
    </div>

    {/* TESTEMUNHOS */}
    <div style={{marginBottom:56}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:11,fontWeight:600,color:"#FF375F",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Testemunhos</div>
        <h2 style={{fontSize:26,fontWeight:700}}>O que dizem os nossos alunos</h2>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>
        {TESTIMONIALS.map((t,i)=>(
          <div key={i} style={{...crd,padding:"20px 22px",border:bd,animation:`fu .4s ease ${.2+i*.06}s both`}}>
            <div style={{display:"flex",gap:2,marginBottom:10}}>{Array.from({length:5},(_,s)=>(<span key={s} style={{fontSize:14,color:s<t.rating?"#FF9500":"#E5E5EA"}}>★</span>))}</div>
            <p style={{fontSize:14,color:"#4A4A4F",lineHeight:1.6,marginBottom:14,fontStyle:"italic"}}>"{t.text}"</p>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:G,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700,flexShrink:0}}>{t.avatar}</div>
              <div><div style={{fontSize:13,fontWeight:600}}>{t.name}</div><div style={{fontSize:11,color:"#86868B"}}>{t.role}</div></div>
            </div>
          </div>
        ))}
      </div>
    </div>

    {/* CTA FINAL */}
    <div style={{background:"linear-gradient(135deg,#0071E3,#AF52DE)",borderRadius:24,padding:"44px 36px",textAlign:"center",marginBottom:16}}>
      <h2 style={{fontSize:28,fontWeight:700,color:"#fff",marginBottom:10}}>Pronto para transformar a tua carreira?</h2>
      <p style={{fontSize:15,color:"rgba(255,255,255,.8)",marginBottom:28,maxWidth:480,margin:"0 auto 28px"}}>Junta-te a 15.000 profissionais portugueses que já usam IA no seu trabalho diário.</p>
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        <button style={{padding:"14px 36px",borderRadius:980,fontSize:15,fontWeight:600,cursor:"pointer",border:"none",background:"#fff",color:"#0071E3",fontFamily:F}} onClick={()=>setView("courses")}>Ver todos os cursos</button>
        <button style={{padding:"14px 36px",borderRadius:980,fontSize:15,fontWeight:600,cursor:"pointer",border:"2px solid rgba(255,255,255,.5)",background:"transparent",color:"#fff",fontFamily:F}} onClick={()=>goStuLogin()}>Criar conta grátis</button>
      </div>
    </div>
  </div>
</div>}<Foot/>{renderPayModal()}{renderToast()}</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
