    function getStudentEmail(){
      try{
        const s=localStorage.getItem('nl7-session');

    async function sbGet(table, id){
      try{
        const {data,error}=await SB.from(table).select('data').eq(id[0],id[1]).maybeSingle();
        if(error||!data)return null;
        return typeof data.data==='string'?data.data:JSON.stringify(data.data);
      }catch{return null;}
    }

    async function sbSet(table, match, jsonVal){
      try{
        const row={...match, data:jsonVal, updated_at:new Date().toISOString()};
        await SB.from(table).upsert(row,{onConflict:Object.keys(match).join(',')});
      }catch(e){console.warn('SB write error:',e);}

    window.storage = {
      get: async (k) => {
        // Sessão: só localStorage
        if(LOCAL_ONLY.has(k)){
          try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch{return null;}
        }
        // Dados globais da plataforma
        if(GLOBAL_KEYS.has(k)){
          const val=await sbGet('nl_platform',['key',k]);
          if(val!==null)return{key:k,value:val};
          // fallback localStorage

        let jsonVal;try{jsonVal=JSON.parse(val);}catch{jsonVal=val;}
        // Sempre guardar em localStorage como cache rápido
        try{localStorage.setItem(k,val);}catch{}
        if(LOCAL_ONLY.has(k))return{key:k,value:val};
        // Dados globais
        if(GLOBAL_KEYS.has(k)){
          await sbSet('nl_platform',{key:k},jsonVal);
          return{key:k,value:val};

          return{key:k,value:val};
        }
        return{key:k,value:val};
      },

      delete: async (k) => {
        try{localStorage.removeItem(k);}catch{}
        if(GLOBAL_KEYS.has(k)){
          try{await SB.from('nl_platform').delete().eq('key',k);}catch{}

        }
        return{key:k,deleted:true};
      },

      list: async (p) => {
        try{const ks=Object.keys(localStorage).filter(k=>!p||k.startsWith(p));return{keys:ks};}catch{return{keys:[]};}
      }
    };
  })();

// NeuroLearn Auth + Payments + i18n Integration Layer v2.0
// All sensitive ops via Edge Functions — zero client secrets

const EF = "https://obpezocujzdaznrdgwoo.supabase.co/functions/v1";

// ── Session ─────────────────────────────────────────────────
let _sess = { token:null, refresh:null, exp:null, user:null };
const getToken = () => _sess.token;

function saveSession(d) {
  _sess = { token:d.access_token, refresh:d.refresh_token, exp:d.expires_at, user:d.user };
  try { localStorage.setItem("nl8s", JSON.stringify(_sess)); } catch(_){}
}
function clearSession() {
  _sess = { token:null, refresh:null, exp:null, user:null };
  try { localStorage.removeItem("nl8s"); } catch(_){}
  ["nl7-session","nl7-n","nl7-notes","nl7-lv","nl7-em","nl7-bd"].forEach(k=>{try{localStorage.removeItem(k);}catch(_){}});
}
function loadSession() {
  try {
    const s = JSON.parse(localStorage.getItem("nl8s")||"null");
    if (!s?.token||!s?.user) return null;
    if (s.exp && Date.now()/1000 > s.exp - 60) return null;
    _sess = s; return s;
  } catch(_){ return null; }
}

// ── API helper ───────────────────────────────────────────────
async function ef(fn, body, auth=false) {
  const h = {"Content-Type":"application/json"};
  if (auth && _sess.token) h["Authorization"] = "Bearer " + _sess.token;
  const r = await fetch(EF+"/"+fn, {method:"POST", headers:h, body:JSON.stringify(body)});
  if (!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

// ── Auth ─────────────────────────────────────────────────────
async function authLogin(email, pw) {
  const d = await ef("auth-user",{action:"login",email,password:pw});
  if (d.ok) saveSession(d);
  return d;
}
async function authRegister(email, pw, name) {
  return ef("auth-user",{action:"register",email,password:pw,name});
}
async function authLogout() {
  await ef("auth-user",{action:"logout"},true).catch(()=>{});
  clearSession();
}
async function authChangePassword(cur, next) {
  return ef("auth-user",{action:"change_password",current_password:cur,new_password:next},true);
}
async function authChangeEmail(newEmail, pw) {
  return ef("auth-user",{action:"change_email",new_email:newEmail,password:pw},true);
}
async function refreshToken() {
  if (!_sess.refresh) return false;
  if (_sess.exp && Date.now()/1000 < _sess.exp - 300) return true;
  try {
    const d = await ef("auth-user",{action:"refresh",refresh_token:_sess.refresh});
    if (d.ok) { _sess.token=d.access_token; _sess.refresh=d.refresh_token; _sess.exp=d.expires_at; return true; }
  } catch(_){}
  clearSession(); return false;
}

// ── Permissions ──────────────────────────────────────────────
const isAdmin = () => { const u=_sess.user; return u&&(u.role==="admin"||u.role==="super_admin"); };
const isSuperAdmin = () => _sess.user?.role==="super_admin";
const hasPerm = p => { const u=_sess.user; if(!u) return false; if(u.role==="super_admin") return true; return u.permissions?.[p]===true; };

  },true);

  return d;
}

async function getCatalog() {

// ── Pages ────────────────────────────────────────────────────
async function getPage(slug) {
  return ef("pages",{action:"get_page",slug});

let _lang = localStorage.getItem("nl8-lang") || navigator.language?.split("-")[0] || "pt";
const LANGS = ["pt","es","fr","en"];
if (!LANGS.includes(_lang)) _lang = "pt";
let _tr = {};
async function loadI18n(lang) {
  try {
    const d = await ef("i18n",{action:"get_all",lang});
    if (d.ok) _tr = d.translations;
  } catch(_){}
}
const t = (key, ns="ui") => _tr[ns]?.[key] || _tr["ui"]?.[key] || key;
function setLang(lang) {
  _lang = lang;
  localStorage.setItem("nl8-lang", lang);
  loadI18n(lang).then(() => {
    if (window._setUiLang) window._setUiLang(lang);
  });
}

// ── Build student object from auth response ──────────────────
async function buildStuObj(u, enrolledIds) {
  return {
    id:u.id, name:u.name, email:u.email,
    role:u.role||"student", permissions:u.permissions||{},
    enr:enrolledIds||[], done:u.done||{},
    joined:u.joined, is_active:u.is_active!==false,
    has_subscription:false, subscription:null,
  };
}

window._NL_BOOT = (async () => {

  const p = new URLSearchParams(location.search);
  if (p.get("pay")==="ok") history.replaceState({},"",location.pathname);
})();

const renderMarkdown = (md) => {
      if (!md) return null;
      const lines = md.split("\n");
      const elements = [];
      let listBuf = [];
      const flushList = () => {
        if (listBuf.length) {
          elements.push(React.createElement("ul", { key: "ul" + elements.length, style: { paddingLeft: 24, marginBottom: 16 } },
            listBuf.map((item, i) => React.createElement("li", { key: i, style: { marginBottom: 6, lineHeight: 1.6 } }, parseInline(item)))));
          listBuf = [];
        }
      };
      const parseInline = (text) => {
        const parts = [];
        let remaining = text;
        let key = 0;
        while (remaining.length) {
          const boldMatch = remaining.match(/\*\*(.+?)\*\*/);
          const linkMatch = remaining.match(/\[(.+?)\]\((.+?)\)/);
          const next = [boldMatch, linkMatch].filter(Boolean).sort((a, b) => a.index - b.index)[0];
          if (!next) { parts.push(remaining); break; }
          if (next.index > 0) parts.push(remaining.slice(0, next.index));
          if (next === boldMatch) {
            parts.push(React.createElement("strong", { key: key++ }, next[1]));
          } else {
            parts.push(React.createElement("a", { key: key++, href: next[2], target: "_blank", rel: "noopener", style: { color: "#2563EB", textDecoration: "underline" } }, next[1]));
          }
          remaining = remaining.slice(next.index + next[0].length);
        }
        return parts;
      };
      lines.forEach((line, i) => {
        if (line.match(/^- /)) { listBuf.push(line.slice(2)); return; }
        flushList();
        if (line.match(/^### /)) elements.push(React.createElement("h3", { key: i, style: { fontSize: 16, fontWeight: 700, marginTop: 24, marginBottom: 10, letterSpacing: "-0.01em" } }, line.slice(4)));
        else if (line.match(/^## /)) elements.push(React.createElement("h2", { key: i, style: { fontSize: 20, fontWeight: 700, marginTop: 36, marginBottom: 14, letterSpacing: "-0.02em", color: "var(--ink)" } }, line.slice(3)));
        else if (line.match(/^# /)) elements.push(React.createElement("h1", { key: i, style: { fontSize: 28, fontWeight: 700, marginBottom: 16 } }, line.slice(2)));
        else if (line.trim()) elements.push(React.createElement("p", { key: i, style: { fontSize: 15, lineHeight: 1.75, marginBottom: 14, color: "var(--ink2)" } }, parseInline(line)));
      });
      flushList();
      return elements;
    };
