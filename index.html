  <script>
  (function(){
    const SB = supabase.createClient(
      'https://obpezocujzdaznrdgwoo.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icGV6b2N1anpkYXpucmRnd29vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTU4MzAsImV4cCI6MjA5MDAzMTgzMH0.SZx4ilUcyaA732zB6qInKVLuFHntzU9C_K0x7Y_dbuc'
    );

    // Chaves que são GLOBAIS (plataforma) vs POR ALUNO
    const GLOBAL_KEYS = new Set(['nl7-c','nl7-lc','nl7-cm']); // cursos, conteudo aulas, comentários
    const STUDENT_KEYS = new Set(['nl7-s','nl7-n','nl7-notes','nl7-lv','nl7-em','nl7-bd']); // alunos, notifs, notas, last viewed, emails, badges
    const LOCAL_ONLY = new Set(['nl7-session']); // sessão só local

    function getStudentEmail(){
      try{
        const s=localStorage.getItem('nl7-session');
        if(s){const o=JSON.parse(s);return o&&o.email?o.email:null;}
      }catch{}
      return null;
    }

    async function sbGet(table, id){
      try{
        const {data,error}=await SB.from(table).select('data').eq(id[0],id[1]).maybeSingle();
        if(error||!data)return null;
        return typeof data.data==='string'?data.data:JSON.stringify(data.data);
      }catch{return null;}
    }

    async function sbSet(table, match, jsonVal){
      try{
        const row={...match, data:jsonVal, updated_at:new Date().toISOString()};
        await SB.from(table).upsert(row,{onConflict:Object.keys(match).join(',')});
      }catch(e){console.warn('SB write error:',e);}
    }

    window._SB = SB; // exposto para ser usado na geração de conteúdo
    window.storage = {
      get: async (k) => {
        // Sessão: só localStorage
        if(LOCAL_ONLY.has(k)){
          try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch{return null;}
        }
        // Dados globais da plataforma
        if(GLOBAL_KEYS.has(k)){
          const val=await sbGet('nl_platform',['key',k]);
          if(val!==null)return{key:k,value:val};
          // fallback localStorage
          try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch{return null;}
        }
        // Dados por aluno
        if(STUDENT_KEYS.has(k)){
          const email=getStudentEmail();
          if(email){
            const val=await sbGet('nl_student_data',['student_email||key',email+'|'+k]);
            // query correcta:
            try{
              const {data,error}=await SB.from('nl_student_data').select('data')
                .eq('student_email',email).eq('key',k).maybeSingle();
              if(!error&&data)return{key:k,value:typeof data.data==='string'?data.data:JSON.stringify(data.data)};
            }catch{}
          }
          // fallback localStorage
          try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch{return null;}
        }
        try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch{return null;}
      },

      set: async (k, v) => {
        const val=typeof v==='string'?v:JSON.stringify(v);
        let jsonVal;try{jsonVal=JSON.parse(val);}catch{jsonVal=val;}
        // Sempre guardar em localStorage como cache rápido
        try{localStorage.setItem(k,val);}catch{}
        if(LOCAL_ONLY.has(k))return{key:k,value:val};
        // Dados globais
        if(GLOBAL_KEYS.has(k)){
          await sbSet('nl_platform',{key:k},jsonVal);
          return{key:k,value:val};
        }
        // Dados por aluno
        if(STUDENT_KEYS.has(k)){
          const email=getStudentEmail();
          if(email){
            try{
              await SB.from('nl_student_data').upsert(
                {student_email:email,key:k,data:jsonVal,updated_at:new Date().toISOString()},
                {onConflict:'student_email,key'}
              );
            }catch(e){console.warn('SB student write:',e);}
          }
          return{key:k,value:val};
        }
        return{key:k,value:val};
      },

      delete: async (k) => {
        try{localStorage.removeItem(k);}catch{}
        if(GLOBAL_KEYS.has(k)){
          try{await SB.from('nl_platform').delete().eq('key',k);}catch{}
        }
        if(STUDENT_KEYS.has(k)){
          const email=getStudentEmail();
          if(email){try{await SB.from('nl_student_data').delete().eq('student_email',email).eq('key',k);}catch{}}
        }
        return{key:k,deleted:true};
      },

      list: async (p) => {
        try{const ks=Object.keys(localStorage).filter(k=>!p||k.startsWith(p));return{keys:ks};}catch{return{keys:[]};}
      }
    };
  })();
  </script>

  const startNarration=(text)=>{
    if(!window.speechSynthesis)return;

    const chunks=text.match(/[^.!?]+[.!?]+/g)||[text];
    let i=0;
    const speakNext=()=>{
      if(i>=chunks.length){setSpeaking(false);return;}
      const u=new SpeechSynthesisUtterance(chunks[i].trim());
      u.lang="pt-PT";u.rate=0.95;u.pitch=1;
      const voices=window.speechSynthesis.getVoices();
      const ptVoice=voices.find(v=>v.lang.startsWith("pt"));
      if(ptVoice)u.voice=ptVoice;
      u.onend=()=>{i++;speakNext();};
      u.onerror=()=>{i++;speakNext();};
      speechRef.current=u;
      window.speechSynthesis.speak(u);
    };
    setSpeaking(true);speakNext();
  };

    const prevCtx=prevLessons.map(l=>{const lc=lcRef.current[l.id];return lc?`${l.mt}: ${(lc.keyPoints||[]).slice(0,2).join("; ")}`:l.mt;}).join(" → ");
    const nextCtx=nextLessons.map(l=>l.title).join(", ");
    // Buscar programa do curso no Supabase — independente por curso, facultativo
    let programCtx="";
    try{
      const {data}=await window._SB.from("nl_programs").select("content").eq("course_id",course.id).maybeSingle();
      if(data?.content) programCtx=data.content;
    }catch{}
    try{
      // Usar Edge Function como proxy seguro para a API Anthropic
      const resp=await fetch("https://obpezocujzdaznrdgwoo.supabase.co/functions/v1/generate-lesson",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          courseTitle:course.title,
          courseLevel:course.lv,
          lessonTitle:lesson.title,
          lessonModule:lesson.mt,
          lessonType:lesson.type,
          lessonIdx,
          totalLessons:allLessons.length,
          prevCtx,
          nextCtx,
          programCtx
        })
      });
      const data=await resp.json();
      if(!data.ok) throw new Error(data.error||"Erro na geração");
      const parsed=data.content;
      const norm={
        paragraphs:parsed.p||parsed.paragraphs||[],
        keyPoints:parsed.kp||parsed.keyPoints||[],
        codeExample:parsed.code||parsed.codeExample||null,
        instructorTip:parsed.tip||parsed.instructorTip||null,
        quiz:parsed.q?{
          question:parsed.q.q||parsed.q.question||"",
          options:parsed.q.o||parsed.q.options||[],
          correctIndex:parsed.q.c??parsed.q.correctIndex??0,
          explanation:parsed.q.e||parsed.q.explanation||""
        }:null
      };
      const updated={...lcRef.current,[key]:norm};
      lcRef.current=updated;
      setLessonContent(updated);
      try{await window.storage.set(LCK,JSON.stringify(updated));}catch{}
    }catch(err){
      console.error("genContent error:",err);
      const fallback={paragraphs:[`Erro ao gerar conteúdo: ${err.message||"tenta novamente"}`],keyPoints:[],codeExample:null,instructorTip:null,quiz:null};
      const updated={...lcRef.current,[key]:fallback};
      lcRef.current=updated;
      setLessonContent(updated);
      try{await window.storage.set(LCK,JSON.stringify(updated));}catch{}
    }

    await new Promise(r=>setTimeout(r,50));

          messages:[{role:"user",content:msg}]})
      });
      const data=await resp.json();
      const text=data.content?.map(i=>i.text||"").join("\n")||"Erro.";
      try{
        const p=JSON.parse(text.replace(/```json|```/g,"").trim());
        if(p.action==="create_course"&&p.course){
          const nc={...p.course,id:String(Date.now()),stu:0,rat:0,pub:false,color:PAL[Math.floor(Math.random()*6)]};

          setAgLoad(false);return;
        }
        if(p.action==="update_program"&&p.course_id&&p.content){
          try{
            await window._SB.from("nl_programs").upsert({course_id:p.course_id,title:p.title||"",content:p.content,updated_at:new Date().toISOString()},{onConflict:"course_id"});

            const courseTitle=courses.find(c=>c.id===p.course_id)?.title||p.course_id;

          }catch(e){setAgMsg(p2=>[...p2,{r:"a",t:`Erro ao actualizar programa: ${e.message}`}]);}
          setAgLoad(false);return;
        }
      }catch{}
      setAgMsg(p=>[...p,{r:"a",t:text}]);

  };

            {!isDone?<button style={{...B(true,true),background:"#30D158",flexShrink:0}} onClick={()=>compLesson(c.id,cur.id)}>✓ Concluir</button>

          {lessonContent[cur.id]&&<div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {!speaking?<button style={{...B(false,true),fontSize:12,...fc,gap:5}} onClick={()=>{const lc=lessonContent[cur.id];const text=(lc.paragraphs||lc.p||[]).join(". ")+(lc.instructorTip||lc.tip?" Dica do instrutor:"+(lc.instructorTip||lc.tip):"");startNarration(text);}}>🔊 Ouvir</button>

              <div style={{fontSize:13,color:"#86868B",maxWidth:400,margin:"0 auto",lineHeight:1.5}}>O formador está a preparar o conteúdo desta aula. Poderás aceder em breve. Entretanto, avança para as aulas já disponíveis.</div>

          {(()=>{const raw=lessonContent[cur.id];const qz=raw?.quiz||raw?.q||cur.quiz;if(!qz)return null;const opts=qz.options||qz.o||qz.opts||[];const correctIdx=qz.correctIndex??qz.c??qz.correct??0;const question=qz.question||qz.q||"";const explanation=qz.explanation||qz.e||"";if(!question||!opts.length)return null;return(

                    {quizDone?(correct?"✓":(sel?"✗":"")):(sel?"●":"")}

          </div>);})()}

          <div style={{...crd,padding:24,border:bd,marginBottom:20}}>
            <h3 style={{fontSize:16,fontWeight:600,marginBottom:10}}>As minhas notas</h3>

  const renderALogin=()=>(<div style={{minHeight:"100vh",...fc,justifyContent:"center",background:"#FBFBFD"}}><style>{anim}</style>

            <div><div style={{fontWeight:600,fontSize:13}}>{s.name}</div><div style={{fontSize:11,color:"#86868B"}}>{s.email}</div></div>
          </div>
          <span style={{fontSize:12,color:"#86868B"}}>{ec.length} cursos</span>
        </div>
        {selStu===s.id&&ec.length>0&&<div style={{marginTop:10,paddingTop:10,borderTop:"0.5px solid rgba(0,0,0,.06)"}}>{ec.map(c=>{const p=gP(s,c.id);return(<div key={c.id} style={{...fc,gap:7,padding:"4px 0"}}><span style={{fontSize:13}}>{c.emoji}</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:500,marginBottom:3}}>{c.title}</div><div style={{height:3,borderRadius:2,background:"#f5f5f7"}}><div style={{height:"100%",borderRadius:2,background:c.color,width:`${p}%`}}/></div></div><span style={{fontSize:11,fontWeight:600,color:c.color}}>{p}%</span></div>);})}</div>}
      </div>);
    })}
  </div>);

  const AAgent=()=>(<div style={{maxWidth:600}}><style>{anim}</style>
    <div style={{textAlign:"center",marginBottom:24}}><div style={{width:44,height:44,borderRadius:12,background:G,...fc,justifyContent:"center",margin:"0 auto 10px",fontSize:18,color:"#fff"}}>✦</div><h1 style={{fontSize:22,fontWeight:700}}>AI Agent</h1><p style={{color:"#86868B",fontSize:12,marginTop:3}}>Cria e gere com linguagem natural</p></div>
    {agMsg.length===0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:20}}>{["Cria um curso sobre RAG","Qual o mais popular?","Actualiza o programa do curso de Excel","Sugere melhorias de conteúdo"].map((s,i)=>(<button key={i} onClick={()=>agSend(s)} style={{padding:"10px 12px",borderRadius:9,background:"#fff",border:"0.5px solid rgba(0,0,0,.08)",cursor:"pointer",textAlign:"left",fontSize:12,color:"#6E6E73",fontFamily:F,transition:"all .2s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#0071E3";e.currentTarget.style.color="#0071E3";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(0,0,0,.08)";e.currentTarget.style.color="#6E6E73";}}>{s}</button>))}</div>}
    <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16,maxHeight:340,overflowY:"auto"}}>
      {agMsg.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start"}}><div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:13,background:m.r==="u"?"#0071E3":"#fff",color:m.r==="u"?"#fff":"#1D1D1F",fontSize:13,lineHeight:1.5,border:m.r==="u"?"none":"0.5px solid rgba(0,0,0,.06)",borderBottomRightRadius:m.r==="u"?4:13,borderBottomLeftRadius:m.r==="u"?13:4}}>{m.act==="ok"&&<span style={{display:"block",marginBottom:2,fontSize:15}}>✅</span>}{m.t}</div></div>))}
      {agLoad&&<div style={{display:"flex",gap:4,padding:"10px 14px"}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#86868B",animation:`dt 1.4s ease ${i*.2}s infinite`}}/>)}</div>}
      <div ref={chatRef}/>
    </div>
    <div style={{display:"flex",gap:7,position:"sticky",bottom:0,paddingTop:8,background:"#F5F5F7"}}>
      <input type="text" value={agIn} onChange={e=>setAgIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&agSend()} placeholder="Pede ao agente..." style={{flex:1,padding:"10px 14px",borderRadius:980,border:"0.5px solid rgba(0,0,0,.1)",fontSize:13,outline:"none",background:"#fff",fontFamily:F}} onFocus={e=>e.target.style.borderColor="#0071E3"} onBlur={e=>e.target.style.borderColor="rgba(0,0,0,.1)"}/>
      <button onClick={()=>agSend()} style={{width:38,height:38,borderRadius:"50%",background:agIn.trim()?"#0071E3":"#E5E5EA",border:"none",cursor:agIn.trim()?"pointer":"default",...fc,justifyContent:"center",fontSize:14,color:"#fff"}}>↑</button>
    </div>
  </div>);

  const ASettings=()=>(<div><style>{anim}</style>
    <h1 style={{fontSize:26,fontWeight:700,marginBottom:24}}>Definições</h1>
    <div style={{...crd,padding:24,border:bd,maxWidth:480,animation:"fu .4s ease both"}}>
      {[["Plataforma","NeuroLearn"],["PIN de gestão",PIN],["URL","neurolearn-rosy.vercel.app"],["Tema","Apple Clean"],["Idioma","Português (PT)"],["Base de dados","Supabase (obpezocujzdaznrdgwoo)"]].map(([l,v],i,arr)=>(<div key={i} style={{...fj,padding:"12px 0",borderBottom:i<arr.length-1?"0.5px solid rgba(0,0,0,.06)":"none",fontSize:14}}><span style={{color:"#86868B"}}>{l}</span><span style={{fontWeight:500,fontSize:12,color:"#1D1D1F"}}>{v}</span></div>))}
    </div>
    <div style={{...crd,padding:20,border:bd,maxWidth:480,marginTop:16,background:"#F9F9FB"}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>🌐 Domínio personalizado</div>
      <p style={{fontSize:12,color:"#6E6E73",lineHeight:1.6,marginBottom:10}}>Para usar um domínio próprio (ex: <strong>neurolearn.pt</strong>), vai a <strong>vercel.com → neurolearn → Settings → Domains</strong> e adiciona o teu domínio. O Vercel dá instruções passo a passo.</p>
      <div style={{fontSize:11,color:"#86868B",padding:"8px 12px",borderRadius:8,background:"#fff",border:"1px dashed #D2D2D7"}}>Custo estimado de domínio .pt: ~€8-15/ano</div>
    </div>
    <button style={{...B(false,true),marginTop:20,color:"#FF375F",borderColor:"#FF375F33"}} onClick={async()=>{await svC(DC);await svS(DS);await svN([]);await svNo({});setNotifs([]);setNotes({});setLessonContent({});lcRef.current={};try{await window.storage.set(LCK,"{}");await window.storage.set(SSK,"null");}catch{};tst("Dados repostos!");}}>Repor dados de demonstração</button>

    <div style={{...crd,padding:20,border:bd,maxWidth:480,marginTop:20}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>📋 Programas dos cursos</div>
      <p style={{fontSize:12,color:"#86868B",lineHeight:1.6,marginBottom:12}}>Cada curso pode ter o seu próprio programa — são independentes entre si. O programa é <strong>facultativo</strong>: cursos sem programa geram conteúdo normalmente com base no título e tópicos. Quando existe programa, a IA usa-o como referência ao gerar ou regenerar aulas.</p>
      <button style={{...B(false,true),fontSize:12,...fc,gap:5}} onClick={async()=>{
        try{
          const {data}=await window._SB.from("nl_programs").select("course_id,title,updated_at").order("updated_at",{ascending:false});
          if(data?.length){
            const list=data.map(p=>`${p.title} (actualizado: ${new Date(p.updated_at).toLocaleDateString("pt-PT")})`).join("\n");
            tst(`${data.length} programas no Supabase`);
            alert("Programas activos:\n\n"+list+"\n\nPara actualizar um programa, usa o Agente: \"Actualiza o programa do curso X com [novo conteúdo]\"");
          } else tst("Nenhum programa encontrado");
        }catch(e){tst("Erro ao carregar programas");}
      }}>📋 Ver programas activos</button>
    </div>
  </div>);

  const AAnalytics=()=>{
    const courseStats=courses.map(c=>{
      const ls=mkL(c.md,c.id);const enrolled=students.filter(s=>s.enr?.includes(c.id));
      const completions=enrolled.filter(s=>gP(s,c.id)===100).length;
      const avgProg=enrolled.length?Math.round(enrolled.reduce((a,s)=>a+gP(s,c.id),0)/enrolled.length):0;
      const lessonStats=ls.map(l=>{const done=enrolled.filter(s=>(s.done?.[c.id]||[]).includes(l.id)).length;return{title:l.title,done,pct:enrolled.length?Math.round(done/enrolled.length*100):0};});
      const dropoff=lessonStats.length>1?lessonStats.reduce((worst,l,i)=>{if(i===0)return worst;const drop=lessonStats[i-1].pct-l.pct;return drop>worst.drop?{lesson:l.title,drop,from:lessonStats[i-1].pct,to:l.pct}:worst;},{lesson:"",drop:0,from:0,to:0}):null;
      return{...c,enrolled:enrolled.length,completions,avgProg,lessonStats,dropoff,contentGen:ls.filter(l=>lessonContent[l.id]).length,totalLessons:ls.length};
    });
    const topCourse=courseStats.reduce((best,c)=>c.enrolled>best.enrolled?c:best,courseStats[0]);
    const worstDropoff=courseStats.filter(c=>c.dropoff?.drop>0).sort((a,b)=>b.dropoff.drop-a.dropoff.drop)[0];
    return(<div><style>{anim}</style>
      <h1 style={{fontSize:26,fontWeight:700,marginBottom:24}}>Analytics</h1>
      <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:12,marginBottom:28}}>
        {[{v:students.length,l:"Total alunos",c:"#0071E3"},{v:courseStats.reduce((a,c)=>a+c.completions,0),l:"Conclusões",c:"#30D158"},{v:`${Math.round(courseStats.reduce((a,c)=>a+c.avgProg,0)/Math.max(courseStats.length,1))}%`,l:"Progresso médio",c:"#AF52DE"},{v:`€${rev.toLocaleString()}`,l:"Receita",c:"#FF9500"}].map((s,i)=>(<div key={i} style={{...crd2,padding:"18px 20px",border:bd,animation:`fu .3s ease ${i*.04}s both`}}><div style={{fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div><div style={{fontSize:10,color:"#86868B",fontWeight:500,marginTop:1,textTransform:"uppercase"}}>{s.l}</div></div>))}
      </div>
      {topCourse&&<div style={{...crd,padding:20,border:bd,marginBottom:16,animation:"fu .4s ease .1s both"}}>
        <div style={{fontSize:13,fontWeight:600,color:"#30D158",marginBottom:6}}>Curso mais popular</div>
        <div style={{fontSize:16,fontWeight:600}}>{topCourse.emoji} {topCourse.title}</div>
        <div style={{fontSize:12,color:"#86868B",marginTop:2}}>{topCourse.enrolled} alunos · {topCourse.completions} conclusões · {topCourse.avgProg}% progresso médio</div>
      </div>}
      {worstDropoff&&worstDropoff.dropoff.drop>10&&<div style={{...crd,padding:20,border:bd,marginBottom:16,borderLeft:"3px solid #FF375F",animation:"fu .4s ease .15s both"}}>
        <div style={{fontSize:13,fontWeight:600,color:"#FF375F",marginBottom:6}}>Maior ponto de desistência</div>
        <div style={{fontSize:14,fontWeight:500}}>{worstDropoff.emoji} {worstDropoff.title}</div>
        <div style={{fontSize:12,color:"#86868B",marginTop:2}}>Queda de {worstDropoff.dropoff.from}% → {worstDropoff.dropoff.to}% na aula: {worstDropoff.dropoff.lesson?.slice(0,50)}</div>
      </div>}
      <h2 style={{fontSize:17,fontWeight:600,marginBottom:14,marginTop:8}}>Detalhe por curso</h2>
      {courseStats.map((c,ci)=>(<div key={c.id} style={{...crd2,padding:"16px 20px",border:bd,marginBottom:10,animation:`fu .3s ease ${.2+ci*.05}s both`}}>
        <div style={{...fj,alignItems:"center",marginBottom:10}}>
          <div style={{...fc,gap:8}}><span style={{fontSize:18}}>{c.emoji}</span><div><div style={{fontSize:14,fontWeight:600}}>{c.title}</div><div style={{fontSize:11,color:"#86868B"}}>{c.enrolled} alunos · {c.completions} concluíram · {c.contentGen}/{c.totalLessons} aulas geradas</div></div></div>
          <div style={{fontSize:18,fontWeight:700,color:c.color}}>{c.avgProg}%</div>
        </div>
        <div style={{display:"flex",gap:2,height:24,borderRadius:4,overflow:"hidden"}}>
          {c.lessonStats.map((l,li)=>(<div key={li} title={`${l.title}: ${l.pct}%`} style={{flex:1,background:l.pct>70?`${c.color}`:l.pct>30?`${c.color}66`:`${c.color}22`,transition:"all .3s",cursor:"pointer",position:"relative"}}/>))}
        </div>
        <div style={{...fj,fontSize:10,color:"#AEAEB2",marginTop:4}}><span>Aula 1</span><span>Aula {c.lessonStats.length}</span></div>
      </div>))}
    </div>);
  };

  const renderToast=()=>toast?<div style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",padding:"10px 20px",borderRadius:980,background:"#1D1D1F",color:"#fff",fontSize:13,fontWeight:500,zIndex:999,animation:"fu .3s ease both",boxShadow:"0 6px 24px rgba(0,0,0,.15)",fontFamily:F}}>{toast.m}</div>:null;

  const Foot=()=>(<footer style={{borderTop:"0.5px solid rgba(0,0,0,.06)",padding:"24px clamp(16px,4vw,48px)",marginTop:28}}><div style={{maxWidth:1200,margin:"0 auto",...fj,fontSize:12,color:"#86868B"}}><span>© 2026 NeuroLearn</span><div style={{display:"flex",gap:14}}>
    <span style={{cursor:"pointer"}} onClick={()=>setView("courses")}>Cursos</span>
    <span style={{cursor:"pointer"}} onClick={()=>{if(curStu){setZone("student");setSView("my");}else goStuLogin();}}>{curStu?"A minha conta":"Área do aluno"}</span>
    {!curStu&&<span style={{cursor:"pointer"}} onClick={()=>setZone("login")}>Gestão</span>}
  </div></div></footer>);

  if(zone==="login")return(<>{renderALogin()}{renderToast()}</>);
  if(zone==="stuLogin")return(<>{renderStuLogin()}{renderToast()}</>);
  if(zone==="admin")return(<div style={{fontFamily:F,color:"#1D1D1F",background:"#F5F5F7",minHeight:"100vh",opacity:mounted?1:0,transition:"opacity .4s"}}>{!isMobile&&<ASide/>}<div style={{marginLeft:isMobile?0:200,padding:isMobile?"16px":"24px 32px",minHeight:"100vh"}}>
    {isMobile&&<div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>{[["dashboard","Dashboard"],["courses","Cursos"],["students","Alunos"],["analytics","Analytics"],["agent","Agent"],["settings","Def."]].map(([k,l])=>(<button key={k} style={{padding:"6px 14px",borderRadius:980,fontSize:12,fontWeight:aView===k?600:400,background:aView===k?"#0071E3":"rgba(0,0,0,.04)",color:aView===k?"#fff":"#6E6E73",border:"none",cursor:"pointer",whiteSpace:"nowrap",fontFamily:F}} onClick={()=>setAView(k)}>{l}</button>))}<button style={{padding:"6px 14px",borderRadius:980,fontSize:12,background:"transparent",color:"#0071E3",border:"none",cursor:"pointer",fontFamily:F,whiteSpace:"nowrap"}} onClick={goPublic}>🌐 Site</button><button style={{padding:"6px 14px",borderRadius:980,fontSize:12,background:"transparent",color:"#FF375F",border:"none",cursor:"pointer",fontFamily:F}} onClick={goPublic}>Sair</button></div>}
    {aView==="dashboard"&&<ADash/>}{aView==="courses"&&<ACourses/>}{aView==="students"&&<AStudents/>}{aView==="agent"&&<AAgent/>}{aView==="analytics"&&<AAnalytics/>}{aView==="settings"&&<ASettings/>}</div>{renderDocViewer()}{renderToast()}</div>);
  if(zone==="student")return(<div style={{fontFamily:F,color:tx1,background:bg1,minHeight:"100vh",opacity:mounted?1:0,transition:"all .4s"}} onClick={()=>{showNotif&&setShowNotif(false);showEmails&&setShowEmails(false);}}><SNav/>{sView==="my"&&<MyCourses/>}{sView==="explore"&&<Explore2/>}{sView==="play"&&<Player/>}{sView==="profile"&&<Profile/>}{renderPayModal()}{renderToast()}</div>);
  return(<div style={{fontFamily:F,color:"#1D1D1F",background:"#FBFBFD",minHeight:"100vh",opacity:mounted?1:0,transition:"opacity .4s"}} onClick={()=>showNotif&&setShowNotif(false)}><PNav/>{view==="home"&&<Home/>}{view==="courses"&&<PubCourses/>}{view==="pricing"&&<Pricing/>}{view==="detail"&&<Detail/>}{view==="about"&&<div style={{maxWidth:640,margin:"0 auto",padding:"64px 20px",textAlign:"center"}}><style>{anim}</style><h1 style={{fontSize:38,fontWeight:700,letterSpacing:"-0.03em",marginBottom:12,animation:"fu .5s ease both"}}>Sobre a NeuroLearn</h1><p style={{fontSize:16,color:"#6E6E73",lineHeight:1.7,animation:"fu .5s ease .1s both"}}>Plataforma de ensino de IA, com cursos criados por profissionais e gerida por agentes inteligentes.</p><div style={{marginTop:36,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>{[{e:"🎯",t:"Prático"},{e:"🧑‍🏫",t:"Especialistas"},{e:"🤖",t:"IA-powered"}].map((x,i)=>(<div key={i} style={{padding:22,borderRadius:16,background:"#fff",border:bd,animation:`fu .5s ease ${.2+i*.08}s both`}}><div style={{fontSize:28,marginBottom:8}}>{x.e}</div><div style={{fontSize:14,fontWeight:600}}>{x.t}</div></div>))}</div></div>}<Foot/>{renderPayModal()}{renderToast()}</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
